# ~/.config/helix/config.toml

theme = "custom"   # see themes/custom.toml below; swap for a built-in like "nord" if you prefer

[editor]
line-number = "absolute"     # relativenumber = false
mouse = true
cursorline = true
scrolloff = 10
idle-timeout = 250           # ~ updatetime (ms before hover/diagnostics popups)
color-modes = true           # statusline tints with the current mode
true-color = true
# NOTE: Helix has no persistent-undo (undofile) equivalent — undo history is per-session.
# NOTE: there is no `clipboard = unnamedplus`. Yank to the system clipboard with "+y and
#       paste with "+p, or uncomment the keymaps at the bottom to make y/p use it by default.

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.lsp]
display-messages = true      # progress messages, the fidget.nvim role
display-inlay-hints = true   # inlay hints on by default (you had a toggle; this is always-on)

[editor.indent-guides]
render = true

# listchars equivalent
[editor.whitespace]
render = { tab = "all", trailing = "all", nbsp = "all" }

[editor.whitespace.characters]
tab = "»"
trailing = "·"
nbsp = "␣"

[editor.soft-wrap]
enable = false               # set true (+ optional max-wrap) for breakindent-style wrapping

# ignorecase + smartcase, combined into one switch
[editor.search]
smart-case = true

# Ctrl-h/j/k/l window navigation. This is the one ergonomic carry-over from the
# Neovim setup; it doesn't fight Helix's model (window focus is paradigm-neutral).
# Helix's own default is the Vim-like `Ctrl-w h/j/k/l` prefix, still available.
[keys.normal]
C-h = "jump_view_left"
C-j = "jump_view_down"
C-k = "jump_view_up"
C-l = "jump_view_right"
# Paragraph jumps are native: `]p` / `[p`. They select the paragraph they move
# over (the selection-first model), which is intended - move again or hit a verb.
# Diagnostics pickers are native too: `Space d` (document) / `Space D` (workspace).

[keys.normal.space]
# File explorer (netrw :Ex). Space-e explores the current file's directory,
# Space-E the workspace root. There is no :Rex; press Esc to leave the
# explorer, or use `ga` (goto_last_accessed_file) to jump back to your file.
e = "file_explorer_in_current_buffer_directory"
E = "file_explorer"
# Markdown preview on demand: render the current file to dark-themed HTML with
# pandoc and open it in the browser (offline, no live reload, re-press to refresh).
m = [":sh $HOME/.config/helix/md-preview.sh '%{buffer_name}'"]

# --- Optional: make yank/paste use the system clipboard by default (unnamedplus-ish) ---
# [keys.normal]
# y = ["yank_to_clipboard"]
# p = ["paste_clipboard_after"]
# P = ["paste_clipboard_before"]
# [keys.select]
# y = ["yank_to_clipboard"]
